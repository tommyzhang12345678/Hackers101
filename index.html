<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hackers101</title>
    <link rel="stylesheet" href="/css/list.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
        display: none;
        }
    </style>
</head>

<body>
    <header>
        <div class="header-content">
            <h1>Hackers101</h1>
            <p>Educational Resources Repository</p>
        </div>
    </header>

    <nav>
        <div class="nav-container">
            <div class="logo">HACKERS101</div>
            <button class="nav-btn" id="logout">LogOut</button>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search resources...">
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="category-filter">
            <button class="category-btn active" data-category="all"><i class="fas fa-ghost"></i> All</button>
            <button class="category-btn" data-category="extensions"><i class="fas fa-puzzle-piece"></i> Extensions</button>
            <button class="category-btn" data-category="resources"><i class="fas fa-link"></i> Resources</button>
        </div>

        <div class="download-grid">
            

        </div>
        
    
    <script type="module" src="/js/main.js"></script>
    <script type="module" src="/js/firestore.js"></script>
    <script type="module">

        

    </script>
    
</body>
</html>
