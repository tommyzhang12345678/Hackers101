<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset</title>
</head>
<body>
    <button onclick="window.location.href='./login.html'">Back to Login</button>
    <input type="email" id="email" placeholder="Email">
    <button id="btnReset">Reset Password</button>
    
    <script type="module">
        
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-analytics.js";
        // TODO: Add SDKs for Firebase products that you want to use
        // https://firebase.google.com/docs/web/setup#available-libraries

        // Your web app's Firebase configuration
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
            apiKey: "AIzaSyDNpIfAaaMkebfaCF_yvw-c96syUAzuAfY",
            authDomain: "hackers101-f36ec.firebaseapp.com",
            databaseURL: "https://hackers101-f36ec-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "hackers101-f36ec",
            storageBucket: "hackers101-f36ec.firebasestorage.app",
            messagingSenderId: "549407812574",
            appId: "1:549407812574:web:6f122016637eb20b3d0b4f",
            measurementId: "G-JF8B21M4KH"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);

        function resetPassword() {
            var email = document.getElementById('email').value;

            const auth = getAuth();
            sendPasswordResetEmail(auth, email)
            .then(() => {
                // Password reset email sent!
                // ..
                alert("Password reset email sent to " + email);
            })
            .catch((error) => {
                const errorCode = error.code;
                const errorMessage = error.message;
                // ..
                alert("Error: " + errorMessage);
            });

        }

        document.getElementById('btnReset').addEventListener('click', resetPassword);

    </script>
</body>
</html>
