<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | My App</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        
        .signup-card { background: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 380px; text-align: center; }
        
        h2 { color: #1e293b; margin-bottom: 8px; font-size: 24px; }
        p.subtitle { color: #64748b; font-size: 14px; margin-bottom: 24px; }
        
        .input-group { text-align: left; margin-bottom: 16px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 6px; }
        input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; box-sizing: border-box; transition: 0.2s; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        
        #btnSignUp { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; font-size: 16px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        #btnSignUp:hover { background: #4338ca; transform: translateY(-1px); }
        
        .footer-text { margin-top: 20px; font-size: 14px; color: #64748b; }
        .footer-text a { color: var(--primary); text-decoration: none; font-weight: 600; }
        
        /* Password requirement hint */
        .hint { font-size: 11px; color: #94a3b8; margin-top: 4px; }
    </style>
</head>
<body>

<div class="signup-card">
    <h2>Join Us</h2>
    <p class="subtitle">Create your account to get started</p>
    
    <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="name@company.com" required>
    </div>

    <div class="input-group">
        <label>Password</label>
        <input type="password" id="pass" placeholder="••••••••" required>
        <div class="hint">Minimum 6 characters required</div>
    </div>

    <button id="btnSignUp">Create Account</button>

    <div class="footer-text">
        Already have an account? <a href="index.html">Sign In</a>
    </div>
</div>

<script type="module">
    import { signUp } from '../js/auth.js';

    const emailInput = document.getElementById('email');
    const passInput = document.getElementById('pass');
    const btnSignUp = document.getElementById('btnSignUp');

    btnSignUp.addEventListener('click', () => {
        const email = emailInput.value;
        const pass = passInput.value;

        if (!email || pass.length < 6) {
            alert("Please enter a valid email and a password of at least 6 characters.");
            return;
        }

        btnSignUp.innerText = "Creating Account...";
        btnSignUp.disabled = true;

        signUp(email, pass);

        // Re-enable button if it fails (signUp has its own alert on error)
        setTimeout(() => {
            btnSignUp.innerText = "Create Account";
            btnSignUp.disabled = false;
        }, 3000);
    });
</script>

</body>
</html>
