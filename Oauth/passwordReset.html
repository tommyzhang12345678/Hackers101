<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset</title>
</head>
<body>
    
    <button onclick="window.location.href='/login.html'">Back to Login</button>
    <input type="email" id="email" placeholder="Email">
    <button id="btnReset">Reset Password</button>
    
    <script type="module">
        import {resetPassword} from "/js/auth.js";
        document.getElementById('btnReset').addEventListener('click', resetPassword);

    </script>
</body>
</html>
